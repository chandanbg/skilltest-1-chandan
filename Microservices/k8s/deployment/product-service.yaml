apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
      metadata:
        labels:
          app: product-service
      spec:
        containers:
          - name: product-service
            image: amiy351/product-service:latest
            ports:
            - containerPort: 3001
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "300m"
                  memory: "256Mi"
              env:
              - name: SERVICE_NAME
                value: "product-service"
              livenessProbe:
                httpGet:
                  path: /health
                  port: 3001
                initialDelaySeconds: 10
                periodSeconds: 10
              readinessProbe:
                httpGet:
                  path: /health
                  port: 3001
                initialDelaySeconds: 5
                periodSeconds: 5