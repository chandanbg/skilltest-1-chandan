apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: microservices-ingress
  namespace: ms
spec:
  rules:
  - host: microservices.local
    http:
      paths:
      - path: /api/users
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 3000
      - path: /api/products
        pathType: Prefix
        backend:
          service:
            name: product-service
            port:
              number: 3001
      - path: /api/order
        pathType: Prefix
        backend:
          service:
            name: order-service
            port:
              number: 3002
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: gateway-service
            port:
              number: 3003