apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: amiy351/user-service:latest
          ports:
          - containerPort: 3000
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                cpu: "300m"
                memory: "256Mi"
            env:
            - name: SERVICE_NAME
              value: "user-service"
            livenessProbe:
              httpGet:
                path: /health
                port: 3000
              initialDelaySeconds: 10
              periodSeconds: 10
            readinessProbe:
              httpGet:
                path: /health
                port: 3000
              initialDelaySeconds: 5
              periodSeconds: 5
                